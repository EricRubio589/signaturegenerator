<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Signature Generator</title>
<style>
body{font-family:Arial;margin:20px;background:#f3f3f3}
.wrap{display:flex;gap:20px}.card{background:#fff;padding:16px;border-radius:8px;box-shadow:0 2px 6px #ccc}
label{display:block;margin-top:8px}input{width:300px;padding:6px}
canvas{border:1px solid #ccc}
button{margin-top:12px;padding:8px 14px}
</style></head><body>
<div class="wrap">
<div class="card">
<label>Name<input id=n value="Eric Rubio"></label>
<label>Title<input id=t value="Telecom Infrastructure Specialist"></label>
<label>Email<input id=e value="erubio@eisd.org"></label>
<label>Phone<input id=p value="817-615-3600"></label>
<button onclick="draw()">Generate</button>
<button onclick="download()">Download PNG</button>
<p>Replace logo.png with your official EISD logo in the same folder for best results.</p>
</div>
<div class="card"><canvas id=c width=900 height=340></canvas></div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const logo=new Image();logo.src='logo.png';logo.onload=draw;logo.onerror=draw;
['n','t','e','p'].forEach(id=>document.getElementById(id).oninput=draw);
function fit(text,max,size,bold=false){ctx.font=(bold?'bold ':'')+size+'px Arial';while(ctx.measureText(text).width>max&&size>10){size--;ctx.font=(bold?'bold ':'')+size+'px Arial';}return size;}
function draw(){
ctx.clearRect(0,0,cv.width,cv.height);ctx.fillStyle='white';ctx.fillRect(0,0,cv.width,cv.height);
if(logo.complete&&logo.naturalWidth)ctx.drawImage(logo,20,20,260,260);else{ctx.strokeRect(20,20,260,260);ctx.font='20px Arial';ctx.fillStyle='#666';ctx.fillText('Place logo.png here',45,155);}
ctx.strokeStyle='#49308a';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(310,20);ctx.lineTo(310,280);ctx.stroke();
let x=350,y=60;
let name=n.value,s=fit(name,500,34,true);ctx.font='bold '+s+'px Arial';ctx.fillStyle='#49308a';ctx.fillText(name,x,y);
ctx.font='bold 24px Arial';ctx.fillText('Everman ISD',x,y+40);
let ts=fit(t.value,500,20);ctx.font=ts+'px Arial';ctx.fillText(t.value,x,y+70);
ctx.font='18px Arial';ctx.fillText(e.value,x,190);ctx.fillText(p.value,x,220);
ctx.fillText('1520 Everman Parkway,',x,250);ctx.fillText('Fort Worth, TX 76140',x,278);
ctx.font='italic 28px Georgia';ctx.fillText('One Goal... One Purpose... Student Success!',140,325);
}
function download(){draw();const link=document.createElement('a');
link.download='signature.png';
link.href=cv.toDataURL('image/png');
document.body.appendChild(link);
link.click();
setTimeout(()=>document.body.removeChild(link),0);}
draw();
</script></body></html>
